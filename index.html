
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SellAI - Аналитик для селлеров</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-top: 0;}
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 30px;}
        .marketplaces { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .btn-mp {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }
        .ozon { background-color: #005bff; color: white; }
        .ozon:hover { background-color: #004ecc; }
        .wb { background-color: #cb11ab; color: white; }
        .wb:hover { background-color: #a30e89; }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 25px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-audit {
            background-color: #28a745;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
        }
        .btn-audit:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Подключение магазина</h1>
        <p>Введите API-ключ вашего кабинета, чтобы нейросеть <b>SellAI</b> могла проанализировать юнит-экономику, конкурентов и предложить точки роста прибыли.</p>
       
        <div class="marketplaces">
            <button class="btn-mp ozon">Ozon</button>
            <button class="btn-mp wb">Wildberries</button>
        </div>

        <input type="text" placeholder="Ваш API-ключ (только для чтения)">
       
        <button class="btn-audit">ПРОВЕСТИ ИИ-АУДИТ МАГАЗИНА</button>
    </div>
</body>
</html>

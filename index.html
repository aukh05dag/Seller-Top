
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SellAI — ИИ аналитика для селлеров</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:
    radial-gradient(circle at top left,#3b82f6 0%,transparent 35%),
    radial-gradient(circle at bottom right,#8b5cf6 0%,transparent 35%),
    #0f172a;
}

.glass{
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
}

.animate-float{
    animation: float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
}

.loader{
    width:18px;
    height:18px;
    border:2px solid rgba(255,255,255,.4);
    border-top:2px solid white;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>

</head>
<body class="min-h-screen text-white">

<header class="w-full p-5 flex justify-between items-center">
    
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-blue-500 to-violet-600 flex items-center justify-center font-bold text-lg">
            S
        </div>

        <div>
            <div class="font-bold text-xl">SellAI</div>
            <div class="text-xs text-slate-400">
                AI Seller Analytics
            </div>
        </div>
    </div>

    <div class="glass px-4 py-2 rounded-full text-sm">
        MVP 1.0
    </div>

</header>

<main class="flex justify-center items-center px-4 py-12">

<div class="glass w-full max-w-lg rounded-3xl p-8 shadow-2xl animate-float">

    <div class="text-center mb-8">

        <div class="inline-flex items-center gap-2 bg-blue-500/20 text-blue-300 px-4 py-2 rounded-full text-sm mb-4">
            🚀 AI Аудит Магазина
        </div>

        <h1 class="text-4xl font-bold mb-3">
            Подключите кабинет
        </h1>

        <p class="text-slate-300 text-sm leading-relaxed">
            SellAI автоматически проанализирует продажи,
            конкурентов, карточки товаров и найдет точки роста прибыли.
        </p>

    </div>

    <form id="connectForm" class="space-y-5">

        <div>
            <label class="block mb-2 text-sm text-slate-300">
                Маркетплейс
            </label>

            <select
                id="marketplace"
                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 transition"
            >
                <option value="Ozon">Ozon</option>
                <option value="Wildberries">Wildberries</option>
            </select>
        </div>

        <div>
            <label class="block mb-2 text-sm text-slate-300">
                API-ключ (Read Only)
            </label>

            <input
                type="password"
                id="apiKey"
                required
                placeholder="Введите API-ключ"
                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500 transition"
            >
        </div>

        <button
            id="submitBtn"
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-violet-600 py-4 rounded-xl font-bold text-lg hover:scale-[1.02] transition-all duration-300 shadow-xl"
        >
            ПРОВЕСТИ ИИ-АУДИТ
        </button>

    </form>

    <div class="mt-6 text-center text-xs text-slate-400">
        🔒 Ключ используется только для чтения данных
    </div>

</div>

</main>

<div
id="successModal"
class="fixed inset-0 hidden bg-black/60 flex items-center justify-center p-4 z-50"
>
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 max-w-md w-full text-center">

        <div class="text-6xl mb-4">✅</div>

        <h2 class="text-2xl font-bold mb-4">
            Подключение выполнено
        </h2>

        <p id="resultText" class="text-slate-300 mb-6"></p>

        <button
            onclick="closeModal()"
            class="bg-blue-600 px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 transition"
        >
            Закрыть
        </button>

    </div>
</div>

<script>
const form = document.getElementById("connectForm");
const btn = document.getElementById("submitBtn");
const modal = document.getElementById("successModal");
const resultText = document.getElementById("resultText");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const marketplace = document.getElementById("marketplace").value;
    const apiKey = document.getElementById("apiKey").value;

    btn.disabled = true;

    btn.innerHTML = `
        <div class="flex justify-center items-center gap-3">
            <div class="loader"></div>
            Подключение...
        </div>
    `;

    // Имитация загрузки перед показом окна успеха
    setTimeout(() => {
        resultText.innerHTML = `
            Маркетплейс: <b>${marketplace}</b><br><br>
            Ключ: <b>${apiKey.substring(0,4)}****</b><br><br>
            В следующей версии здесь откроется аналитический дашборд SellAI.
        `;
        modal.classList.remove("hidden");
    }, 2000); 
});

// Функция, которая закрывает окно (ты её нечаянно удалил)
function closeModal() {
    modal.classList.add("hidden");
    btn.disabled = false;
    btn.innerHTML = 'ПРОВЕСТИ ИИ-АУДИТ';
    form.reset();
}
</script>

</body>
</html>
